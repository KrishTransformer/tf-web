# This workflow will build a package using maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path
# Just an other comment
name: CI/CD with Maven and Docker

on:
  push:
    branches: [main]

jobs:
  build-react:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}
      # - run: npm install --force
      # - run: CI='' npm run build --if-present

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and Push Docker Image
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            krishtransformer/tf-web:v1
            krishtransformer/tf-web:latest
      - name: Webhook
        uses: joelwmale/webhook-action@master
        with:
          url: "https://tf-cad-service.trafointel.com/redeploy/redeploy-tf-web"
